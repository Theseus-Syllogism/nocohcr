<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Resources</title>
<style>
:root{color-scheme:light dark}
*{box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;max-width:44rem;margin:0 auto;padding:2.5rem 1.25rem;line-height:1.6;color:#1a1a1a;background:#fff}
h1{font-size:2rem;margin:.2rem 0}
.intro{color:#555;margin-bottom:1.5rem}
.res{display:block;border:1px solid #e5e7eb;border-radius:.7rem;padding:1rem 1.1rem;margin:.7rem 0;text-decoration:none;color:inherit}
.res:hover{border-color:#2563eb}
.res h3{margin:0 0 .25rem;color:#2563eb}
.res p{margin:0;color:#555;font-size:.95rem}
@media (prefers-color-scheme:dark){body{color:#e8e8e8;background:#141414}.intro,.res p{color:#aaa}.res{border-color:#333}.res h3{color:#8ab4ff}}
</style>
</head>
<body>
<h1>Helpful Resources</h1>
<p class="intro">A short description of what this list is for.</p>
<a class="res" href="https://example.com"><h3>Resource name</h3><p>One line about what it offers and who it helps.</p></a>
<a class="res" href="https://example.com"><h3>Another resource</h3><p>A brief, plain-language description.</p></a>
<a class="res" href="https://example.com"><h3>A third resource</h3><p>Hours, phone number, or address can go here.</p></a>
</body>
</html>
