<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your Name</title>
<style>
:root{color-scheme:light dark}
*{box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;padding:2.5rem 1rem;background:linear-gradient(160deg,#eef2ff,#fce7f3);color:#1a1a2e}
.card{width:100%;max-width:30rem;text-align:center}
.avatar{width:104px;height:104px;border-radius:50%;margin:0 auto 1rem;display:grid;place-items:center;font-size:3.2rem;background:#fff;box-shadow:0 10px 34px rgba(0,0,0,.14)}
h1{margin:.2rem 0;font-size:1.7rem}
.tag{opacity:.85;margin:.2rem 0 1.6rem}
.links{display:flex;flex-direction:column;gap:.75rem}
.links a{display:block;padding:.95rem 1rem;border-radius:.85rem;background:rgba(255,255,255,.9);color:#1a1a2e;text-decoration:none;font-weight:600;box-shadow:0 4px 14px rgba(0,0,0,.08)}
.links a:hover{transform:translateY(-2px)}
footer{margin-top:2rem;font-size:.8rem;opacity:.6}
@media (prefers-color-scheme:dark){body{background:linear-gradient(160deg,#1e1b4b,#3b0764);color:#f0f0f5}.avatar{background:#2a2550}.links a{background:rgba(255,255,255,.12);color:#f0f0f5}}
</style>
</head>
<body>
<main class="card">
<div class="avatar">🌟</div>
<h1>Your Name</h1>
<p class="tag">A short line about you.</p>
<nav class="links">
<a href="https://example.com">My link one</a>
<a href="https://example.com">My link two</a>
<a href="https://example.com">My link three</a>
</nav>
<footer>Made on Blindvault</footer>
</main>
</body>
</html>
