# /etc/nginx/conf.d/blindvault-usersites.conf  (STAGED — .disabled = NOT loaded)
# Neocities-style user sites at <handle>.yourdomain.com.
#
# Untrusted user HTML/CSS. This vhost DELIBERATELY does NOT inherit the app's
# locked-down CSP (that app CSP would forbid the users' own markup). Content is
# static-only (no fastcgi/SSI/CGI -> no server-side execution); JS is stripped
# at publish AND blocked here by `script-src 'none'`.
#
# ============================  GO-LIVE  =====================================
#  1. Verify no real subdomain is shadowed by the regex (the lookahead below
#     excludes the known ones; explicit server blocks like meet./mta-sts. also
#     win over a regex server_name automatically):
#        for h in www meet mail mta-sts autoconfig autodiscover api; do \
#          echo "$h:"; curl -skI https://$h.yourdomain.com/ | head -1; done
#  2. Add the API route to the MAIN app vhost (/etc/nginx/conf.d/blindvault.conf),
#     inside the yourdomain.com `server {}` block, ALONGSIDE the other /api/ rules:
#
#        location ^~ /api/sites/ {
#            limit_req zone=bv_api burst=60 nodelay;
#            proxy_pass http://127.0.0.1:8800;
#            proxy_http_version 1.1;
#            proxy_set_header Connection "";
#            proxy_set_header Host              $host;
#            proxy_set_header X-Real-IP         $remote_addr;
#            proxy_read_timeout 120s;
#            client_max_body_size 64m;          # zip/file uploads
#            add_header Cache-Control "no-store" always;
#        }
#
#  3. mv blindvault-usersites.conf.disabled blindvault-usersites.conf
#  4. nginx -t && systemctl reload nginx
# ===========================================================================

limit_req_zone  $binary_remote_addr zone=bv_usersites:10m rate=200r/s;
limit_req_zone  $binary_remote_addr zone=bv_siteform:10m  rate=4r/m;
limit_conn_zone $binary_remote_addr zone=bv_usersites_conn:10m;

# HTTP -> HTTPS for any user subdomain.
server {
    listen 80;
    listen [::]:80;
    server_name "~^(?!(?:www|mail|smtp|imap|pop|mx|ns1|ns2|meet|mta-sts|autoconfig|autodiscover|api|admin|cdn|static|status)\.yourdomain\.com$)(?<handle>[a-z0-9-]{3,32})\.yourdomain\.com$";
    location ^~ /.well-known/acme-challenge/ { root /var/www/_acme; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    # Match <handle>.yourdomain.com but exclude operational subdomains. Explicit
    # server blocks (meet., mta-sts., ...) already beat this regex; the negative
    # lookahead also covers names that have no explicit block (mail, autoconfig).
    server_name "~^(?!(?:www|mail|smtp|imap|pop|mx|ns1|ns2|meet|mta-sts|autoconfig|autodiscover|api|admin|cdn|static|status)\.yourdomain\.com$)(?<handle>[a-z0-9-]{3,32})\.yourdomain\.com$";

    ssl_certificate     /etc/letsencrypt/live/yourdomain-wildcard/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain-wildcard/privkey.pem;
    include             /etc/nginx/snippets/ssl-params.conf;

    root /var/lib/bv-sites/$handle/published;

    # --- Sandbox header set (NOT the app CSP). JS cannot execute here. -------
    # script-src 'self' (NOT 'none'): the ONLY script that can exist same-origin
    # is the edge-injected /bv-widgets.js (users cannot create .js — EXT_DENY —
    # nor inline script — sanitizer + no 'unsafe-inline'). connect-src 'self'
    # lets the contact-form widget POST same-origin. CSS kept inline-capable but
    # server-scrubbed (scrubCss) against @import/external-url/fixed-overlay.
    more_set_headers "Content-Security-Policy: default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; media-src 'self'; connect-src 'self'; worker-src 'self'; object-src 'none'; frame-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'";
    more_set_headers "X-Content-Type-Options: nosniff";
    more_set_headers "Referrer-Policy: no-referrer";
    more_set_headers "Cross-Origin-Opener-Policy: same-origin";
    more_set_headers "Cross-Origin-Resource-Policy: same-site";
    more_set_headers "Origin-Agent-Cluster: ?1";
    more_set_headers "X-Frame-Options: SAMEORIGIN";
    more_set_headers "Permissions-Policy: interest-cohort=(), browsing-topics=(), camera=(), microphone=(), geolocation=(), payment=(), usb=()";
    more_set_headers "Strict-Transport-Security: max-age=63072000; includeSubDomains";
    more_clear_headers "Server";

    client_max_body_size 1m;          # sites are static; content is pushed via the API
    limit_conn bv_usersites_conn 32;

    location ~ /\. { deny all; }       # no dotfiles

    # Curated widget runtime — the ONLY script allowed (CSP script-src 'self').
    # Served from outside user dirs (tamper-proof); exact-match shadows try_files.
    location = /bv-widgets.js {
        root /var/www/bv-widgets;
        add_header Cache-Control "public, max-age=600" always;
        gzip_static off;
    }

    # Contact-form receiver -> bv-sites. Handle is derived from the Host header
    # server-side (never client-supplied). Strict rate limit (4/min/IP).
    location = /api/sites/form {
        limit_req zone=bv_siteform burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8800;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 64k;
        add_header Cache-Control "no-store" always;
    }

    location / {
        limit_except GET HEAD { deny all; }
        limit_req zone=bv_usersites burst=200 nodelay;
        add_header Cache-Control "public, max-age=60" always;
        # Inject the one curated runtime at the edge so published HTML stays
        # script-free on disk. The security control is CSP script-src 'self' +
        # EXT_DENY + nosniff, NOT this injection. gzip_static off so sub_filter
        # always sees plain HTML (sub_filter match is case-insensitive).
        sub_filter_once on;
        sub_filter_types text/html;
        sub_filter '</head>' '<script defer src="/bv-widgets.js"></script></head>';
        gzip_static off;
        try_files $uri $uri/ =404;
        index index.html;
    }
}
