# /etc/nginx/nginx.conf
# nginx 1.30.0 (source build) + OpenSSL 3.6.2 (patched for JA3/JA4)
# Modules: ngx_ssl_fingerprint (JA3/JA4/HTTP2), ngx_http_geoip2, headers-more
# Topology:  client --TLS--> nginx (edge: TLS, JA3/JA4, GeoIP, sec-headers)
#                       --> Anubis (PoW/bot challenge, 127.0.0.1:8923)
#                       --> your backend app (Anubis TARGET)

user                 nginx nginx;
worker_processes     auto;
worker_rlimit_nofile 65535;
pid                  /run/nginx.pid;

# Master starts as root (to bind :80/:443) then drops to the unprivileged
# 'nginx' user for all worker processes. Workers never run as root.

events {
    worker_connections 16384;
    multi_accept       on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ---- hardening: never advertise version / build ----
    server_tokens off;

    # ---- performance baseline ----
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 4096;

    # ---- request hardening ----
    client_max_body_size      16m;
    client_body_timeout       12s;
    client_header_timeout     12s;
    send_timeout              10s;
    large_client_header_buffers 4 16k;

    # ===================================================================
    # GeoIP2 (DB-IP free lite databases). These directives REGISTER the
    # $geoip2_* variables, so they must appear BEFORE log_format uses them.
    # Refresh the .mmdb files monthly (see /usr/local/sbin/update-geoip.sh).
    # ===================================================================
    geoip2 /usr/share/GeoIP/dbip-country-lite.mmdb {
        auto_reload 60m;
        $geoip2_country_iso  source=$remote_addr country iso_code;
        $geoip2_country_name source=$remote_addr country names en;
    }
    geoip2 /usr/share/GeoIP/dbip-city-lite.mmdb {
        auto_reload 60m;
        $geoip2_city_name    source=$remote_addr city names en;
    }

    # ===================================================================
    # Structured JSON access log including TLS client fingerprints.
    # $http_ssl_ja3 / _ja3_hash / _ja4 / $http2_fingerprint come from the
    # ngx_ssl_fingerprint module; geoip vars from geoip2; tls vars built-in.
    # Use this to hunt scanners/bots: a JA3/JA4 hash identifies the client
    # TLS stack regardless of spoofed User-Agent.
    # ===================================================================
    # TEMP DIAGNOSTIC (auth-persistence debug, remove after): is the bearer present?
    map $http_authorization $bv_auth_present { default "0"; "~.+" "1"; }
    log_format bv_authdbg escape=json
        '{"t":"$time_iso8601","method":"$request_method","uri":"$request_uri","status":$status,"auth_present":"$bv_auth_present","ua":"$http_user_agent"}';

    log_format secure escape=json
        '{'
          '"time":"$time_iso8601",'
          '"remote_addr":"$remote_addr",'
          '"geo_country":"$geoip2_country_iso",'
          '"geo_city":"$geoip2_city_name",'
          '"method":"$request_method",'
          '"host":"$host",'
          '"uri":"$request_uri",'
          '"status":$status,'
          '"bytes_sent":$body_bytes_sent,'
          '"referer":"$http_referer",'
          '"user_agent":"$http_user_agent",'
          '"tls_version":"$ssl_protocol",'
          '"tls_cipher":"$ssl_cipher",'
          '"ja3":"$http_ssl_ja3",'
          '"ja3_hash":"$http_ssl_ja3_hash",'
          '"ja4":"$http_ssl_ja4",'
          '"http2_fp":"$http2_fingerprint",'
          '"request_time":$request_time'
        '}';

    access_log /var/log/nginx/access.log secure;
    error_log  /var/log/nginx/error.log  warn;

    # ---- compression ----
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript
                    image/svg+xml;

    # ---- rate limiting zones (applied per-location below) ----
    limit_req_zone  $binary_remote_addr zone=req_per_ip:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # ---- upstream: Anubis bot-fingerprint / proof-of-work proxy ----
    upstream anubis {
        server 127.0.0.1:8923;
        keepalive 32;
    }

    include /etc/nginx/conf.d/*.conf;
}
