# Kavita "Community Library" vhost — served on :9989 (the URL the PWA links to:
# https://yourdomain.com:9989/). Kavita itself runs in Docker on 127.0.0.1:5000.
# The /blindvault-sso path is served by the BlindVault API and writes the
# Kavita-origin localStorage session, then redirects into the reader.

# WebSocket upgrade map for Kavita's SignalR hubs (only define if not elsewhere).
map $http_upgrade $kavita_conn_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 9989 ssl;
    listen [::]:9989 ssl;
    http2 on;
    server_name yourdomain.com www.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    client_max_body_size 0;   # Kavita can serve/accept large files

    # SSO bridge — BlindVault API renders the page that seeds Kavita's
    # localStorage session on THIS origin, then redirects to the reader.
    location = /blindvault-sso {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else -> Kavita (incl. SignalR websockets at /hubs/).
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $kavita_conn_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }
}
