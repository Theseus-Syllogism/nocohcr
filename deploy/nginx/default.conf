# /etc/nginx/conf.d/default.conf
# Edge server: terminates TLS, captures JA3/JA4 + GeoIP, sets security headers,
# and proxies everything to Anubis (which challenges bots, then forwards to TARGET).

# --- Drop connections for unknown/missing Host (anti-scan default server) ---
server {
    listen      80  default_server;
    listen      443 ssl default_server;
    http2       on;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/self-signed.crt;
    ssl_certificate_key /etc/nginx/ssl/self-signed.key;
    include             /etc/nginx/snippets/ssl-params.conf;

    return 444;  # close connection without response
}

# --- HTTP -> HTTPS redirect for the real vhost ---
server {
    listen      80;
    # >>> replace 'example.com' with your real hostname(s) <<<
    server_name example.com www.example.com;
    return 301 https://$host$request_uri;
}

# --- Main HTTPS vhost ---
server {
    listen      443 ssl;
    http2       on;
    # >>> replace 'example.com' with your real hostname(s) <<<
    server_name example.com www.example.com;

    ssl_certificate     /etc/nginx/ssl/self-signed.crt;   # >>> replace with CA/Let's Encrypt cert <<<
    ssl_certificate_key /etc/nginx/ssl/self-signed.key;
    include             /etc/nginx/snippets/ssl-params.conf;

    # Security response headers (headers-more) — applied to all responses.
    include /etc/nginx/snippets/security-headers.conf;

    # Connection / request rate limiting (zones defined in nginx.conf).
    limit_conn conn_per_ip 50;
    limit_req  zone=req_per_ip burst=40 nodelay;

    # nginx internal health/metrics — loopback only, never proxied to Anubis.
    location = /nginx-status {
        stub_status;
        access_log off;
        allow 127.0.0.1;
        allow ::1;
        deny  all;
    }

    # Everything else goes through Anubis for bot fingerprinting / PoW challenge.
    location / {
        include /etc/nginx/snippets/proxy-anubis.conf;
        proxy_pass http://anubis;
    }
}
