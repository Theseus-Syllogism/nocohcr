# /etc/nginx/snippets/proxy-anubis.conf
# Reverse-proxy parameters for forwarding to the Anubis bot-defense proxy.
# Anubis then applies its challenge/fingerprint policy and forwards to TARGET.

proxy_http_version 1.1;
proxy_set_header   Connection "";

# --- identity / scheme headers Anubis (and your backend) rely on ---
proxy_set_header   Host              $host;
proxy_set_header   X-Real-IP         $remote_addr;
proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header   X-Forwarded-Proto $scheme;
proxy_set_header   X-Forwarded-Host  $host;

# --- TLS client fingerprints captured at the edge, forwarded downstream ---
# Lets Anubis / your app correlate or block by TLS stack even when the
# User-Agent is spoofed. (Anubis also computes JA4/THR1 itself.)
proxy_set_header   X-TLS-JA3      $http_ssl_ja3;
proxy_set_header   X-TLS-JA3-Hash $http_ssl_ja3_hash;
proxy_set_header   X-TLS-JA4      $http_ssl_ja4;
proxy_set_header   X-TLS-Version  $ssl_protocol;
proxy_set_header   X-TLS-Cipher   $ssl_cipher;

proxy_connect_timeout 5s;
proxy_send_timeout    30s;
proxy_read_timeout    30s;

# Don't let upstream override our security headers (headers-more re-adds them).
proxy_hide_header  X-Powered-By;
