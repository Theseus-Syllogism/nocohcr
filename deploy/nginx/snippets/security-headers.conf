# /etc/nginx/snippets/security-headers.conf
# Security response headers via the headers-more module.
# Unlike add_header, more_set_headers also applies to error/4xx/5xx responses
# and reliably overrides headers set by the upstream (Anubis / backend).

# HSTS — 2 years, include subdomains, preload-eligible.
# Only meaningful over HTTPS; safe to send on the TLS vhost.
more_set_headers  "Strict-Transport-Security: max-age=63072000; includeSubDomains; preload";

# Stop MIME sniffing.
more_set_headers  "X-Content-Type-Options: nosniff";

# Clickjacking protection (CSP frame-ancestors is the modern equivalent below).
more_set_headers  "X-Frame-Options: SAMEORIGIN";

# Referrer hygiene.
more_set_headers  "Referrer-Policy: strict-origin-when-cross-origin";

# Lock down powerful browser features by default.
more_set_headers  "Permissions-Policy: geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()";

# Baseline Content-Security-Policy. TIGHTEN per your app (script/style sources).
more_set_headers  "Content-Security-Policy: default-src 'self'; frame-ancestors 'self'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests";

# Cross-origin isolation hardening.
more_set_headers  "Cross-Origin-Opener-Policy: same-origin";
more_set_headers  "Cross-Origin-Resource-Policy: same-origin";

# Legacy XSS auditor: explicitly disabled (modern guidance).
more_set_headers  "X-XSS-Protection: 0";

# Strip identifying server/upstream headers (defense-in-depth on top of server_tokens off).
more_clear_headers "Server";
more_clear_headers "X-Powered-By";
more_set_headers   "Server: web";
