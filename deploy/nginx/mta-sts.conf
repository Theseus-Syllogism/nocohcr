# MTA-STS policy host. Serves the (only) policy file over HTTPS with a valid
# cert, per RFC 8461. Sending MTAs (Gmail, Microsoft) fetch
# https://mta-sts.yourdomain.com/.well-known/mta-sts.txt to learn they must use
# TLS to reach yourdomain.com's MX.
server {
    listen 80;
    listen [::]:80;
    server_name mta-sts.yourdomain.com;
    location ^~ /.well-known/acme-challenge/ { root /var/www/_acme; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name mta-sts.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    location = /.well-known/mta-sts.txt {
        default_type text/plain;
        root /var/www/mta-sts;
        add_header Cache-Control "max-age=86400";
    }
    location / { return 404; }
}
