# /etc/nginx/conf.d/blindvault.conf
# blindvault (Blindvault) served as a DIRECT vhost on the existing hardened
# edge nginx (JA3/JA4 + GeoIP + CrowdSec). It does NOT go through Anubis: the
# PoW bot-challenge would block the vulnerable, low-end-phone users this app
# serves. TLS + fingerprinting + GeoIP logging + CrowdSec still apply (edge).
#
# This file is included inside http{} (via conf.d/*.conf), so the limit_*_zone
# directives below are valid here. Zone names are blindvault-specific to avoid
# colliding with the edge's req_per_ip / conn_per_ip zones.
#
# The static fan-out on a cold load is large: ~250 dist modules + up to ~260
# Shoelace component chunks (the autoloader fetches one per <sl-*> on the page)
# + the SW precache + a map tile grid — easily 500-700 near-simultaneous GETs,
# and more when a SW cache-bump forces overlapping cold reloads. The old
# rate=500r/s burst=600 throttled this and returned 503 HTML pages, which the
# browser then refused to execute as ES modules ("disallowed MIME type
# text/html"). Sized well above the worst-case fan-out. Static files are
# immutable disk reads, so a generous per-IP allowance is not an abuse vector.
limit_req_zone  $binary_remote_addr zone=bv_static:10m rate=2000r/s;
limit_req_zone  $binary_remote_addr zone=bv_api:10m    rate=40r/s;
limit_conn_zone $binary_remote_addr zone=bv_conn:10m;
# Digital Library download proxy (yt-dlp) — abuse control. Each /start kicks off
# a real yt-dlp job (CPU + egress + up to 500 MB temp), so it is throttled hard
# at 12 starts/min/IP. Only /api/download/start is limited; status polling and
# the file stream are NOT (they fire many times per legitimate job).
limit_req_zone  $binary_remote_addr zone=bv_download:10m rate=12r/m;

# --- HTTP -> HTTPS for the blindvault hostnames -----------------------------
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com YOUR_SERVER_IP yourdomain.com www.yourdomain.com YOUR_SERVER_HOSTNAME;
    location /.well-known/acme-challenge/ { root /var/www/_acme; }
    location / { return 301 https://$host$request_uri; }
}

# --- Main HTTPS vhost -------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name yourdomain.com www.yourdomain.com YOUR_SERVER_IP yourdomain.com www.yourdomain.com YOUR_SERVER_HOSTNAME;

    # Let's Encrypt cert for yourdomain.com + www (issued anonymously via certbot
    # webroot; auto-renews via the certbot systemd timer with a reload hook).
    # Trusted cert → the service worker registers → PWA install/offline works.
    # IP/other-name access gets a name-mismatch warning (yourdomain.com is canonical).
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/nginx/snippets/ssl-params.conf;

    root  /var/www/blindvault;
    index index.html;

    # --- blindvault security headers + app CSP (NOT the generic edge snippet;
    #     this app needs a specific CSP: wasm-unsafe-eval, the importmap hash,
    #     blob: in connect-src for the Shoelace blob-icon resolver, data:/blob:
    #     images for the map, OSM tile origins, and trusted-types). --------------
    # more_set_headers (headers-more) instead of add_header: it applies to ALL
    # responses (incl. 4xx/5xx) AND is NOT suppressed when a location sets its
    # own add_header (e.g. Cache-Control below). With add_header, the location's
    # Cache-Control would strip the CSP from index.html — the one place it must
    # be present. headers-more is compiled into this edge nginx.
    more_set_headers "Strict-Transport-Security: max-age=63072000; includeSubDomains";
    more_set_headers "X-Content-Type-Options: nosniff";
    more_set_headers "X-Frame-Options: DENY";
    more_set_headers "Referrer-Policy: no-referrer";
    more_set_headers "Permissions-Policy: interest-cohort=(), browsing-topics=(), camera=(), microphone=(), geolocation=(self), payment=(), usb=()";
    more_set_headers "Cross-Origin-Opener-Policy: same-origin";
    more_set_headers "Cross-Origin-Resource-Policy: same-origin";
    more_set_headers "Content-Security-Policy: default-src 'none'; script-src 'self' 'wasm-unsafe-eval' 'sha256-8RboIxE07+QFBP31/6jSssrNNrMpPY34Uv+B2HGT138='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://tile.openstreetmap.org https://*.tile.openstreetmap.org https://archive.org; connect-src 'self' blob: https://tile.openstreetmap.org https://*.tile.openstreetmap.org https://archive.org; manifest-src 'self'; worker-src 'self'; font-src 'self'; media-src 'self' blob: https://archive.org https://*.archive.org; object-src 'self' blob:; frame-src 'self' blob: https://archive.org; child-src 'self' blob:; frame-ancestors 'none'; base-uri 'none'; form-action 'self'";
    # Trusted Types: the app now ships a DOMPurify-backed 'default' TT policy
    # (/vendor/tt-default-policy.js, loaded before the bundle in index.html), so
    # every innerHTML sink is sanitized once TT is enforced. We are rolling this
    # out in REPORT-ONLY first (below) — it breaks nothing and surfaces any sink
    # violations (Function/worker) in the browser console. To ENFORCE, append
    #   require-trusted-types-for 'script'; trusted-types default bv-email dompurify lit-html 'allow-duplicates';
    # to the enforcing Content-Security-Policy above and reload. Removing it is
    # the instant kill-switch (no bundle redeploy needed). (lit-html = the app's
    # UI library policy; must be allowed or the app breaks under enforcement.)
    more_set_headers "Content-Security-Policy-Report-Only: require-trusted-types-for 'script'; trusted-types default bv-email dompurify lit-html 'allow-duplicates'";
    more_clear_headers "Server";

    client_max_body_size 32m;
    client_body_buffer_size 128k;
    # Per-IP concurrent-connection cap. Keyed on $binary_remote_addr, so every
    # user behind one public IP shares this counter. Our users are predominantly
    # on mobile carriers (T-Mobile/Sprint 172.58.0.0/15, 172.59.0.0/16, etc.)
    # whose CGNAT collapses DOZENS of real phones onto a single remote_addr. The
    # cold SPA load fans out to ~500-700 near-simultaneous GETs (Shoelace chunk
    # autoloader + SW precache); on a flaky cellular link the browser also churns
    # H2 connections that linger half-open here. At 64 this tripped repeatedly
    # ("limiting connections by zone bv_conn" -> 503 on /vendor chunks -> the SPA
    # never boots -> looks "down"; outages 2026-06-03, -06-10, -06-11). Raised to
    # 512: per the same reasoning as the bv_static rate (immutable disk reads are
    # not an abuse vector), this gives a CGNAT pool of legitimate low-end-phone
    # users ample headroom while still capping a single host's connection flood.
    limit_conn bv_conn 512;

    # ACME challenge passthrough (for the future LE upgrade).
    location ^~ /.well-known/acme-challenge/ { root /var/www/_acme; }

    # --- Hidden dotfiles -> 404 ---------------------------------------------
    # Scanners constantly probe /.env, /.git/config, /.env.production, editor
    # swap files, etc. Without this they fall through to `location /` and get
    # the 200 SPA shell (index.html), which looks like a secret leak in the
    # logs and invites scanners to escalate. Return 404 and stop logging the
    # noise. The negative lookahead keeps /.well-known/ working (ACME above is
    # already a higher-priority ^~ match; this also preserves security.txt etc).
    location ~ /\.(?!well-known/) {
        return 404;
        access_log off;
        log_not_found off;
    }

    # --- cPanel/WHM proxy-subdomain scanner bait -> 404 ----------------------
    # Scanners probe /___proxy_subdomain_whm/ and /___proxy_subdomain_cpanel/
    # because cPanel exposes these paths. This server has no cPanel. Without
    # this block the SPA try_files fallback returns 200, which signals "found"
    # and causes scanners to escalate (POST login_only=1, brute-force attempts).
    location ^~ /___proxy_subdomain_ {
        return 404;
        access_log off;
        log_not_found off;
    }

    # --- Digital Library download proxy (yt-dlp) ----------------------------
    # The "Save a video/song" UI POSTs /api/download/start, polls
    # /api/download/status/<id>, then streams /api/download/file/<id>. These are
    # served by bv-download-proxy on 127.0.0.1:8082 (NOT the Rust API). More
    # specific than `^~ /api/` below, so these win for /api/download/*.
    #
    # /start is rate-limited (12/min/IP, returns 429 which the UI handles). The
    # other download routes are deliberately NOT in the bv_download zone: status
    # polling and the (up to 500 MB) file stream fire many times per real job.
    location = /api/download/start {
        limit_req zone=bv_download burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store" always;
    }
    location ^~ /api/download/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Stream the file straight through (no full-body buffering) and allow a
        # job's worth of wall-clock for the download to complete server-side.
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        add_header Cache-Control "no-store" always;
    }

    # --- Jitsi room config: served at the edge until the API owns it ----
    location = /api/jitsi/config {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        return 200 '{"domain":"meet.yourdomain.com","roomPrefix":"app-help","defaultDisplayName":"Guest","lowBandwidthDefault":true,"embedAllowed":false,"serverRooms":false}';
    }
    location = /api/jitsi/rooms {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        return 201 '{"room":{"name":"app-help-$request_id","subject":"Support call","created_at":"2026-06-01T00:00:00.000Z"},"config":{"domain":"meet.yourdomain.com","lowBandwidthDefault":true,"serverRooms":false}}';
    }

    # --- Public resources fallback ------------------------------------------
    # The bundled #/resources page expects /api/resources to return a JSON list.
    # Serve a small verified fallback at the edge until the API owns this route.
    location = /api/resources {
        default_type application/json;
        add_header Cache-Control "public, max-age=300" always;
        try_files /api-resources-fallback.json =404;
    }

    # --- API: reverse-proxy to the Rust API on loopback ---------------------
    # Single binary on :8088. Routes it doesn't serve (resources/route/etc. —
    # separate services, not deployed) return 404; the PWA degrades gracefully.

    location = /api/books/save-to-library {
        proxy_pass http://127.0.0.1:8083;
        proxy_set_header Host $host;
        proxy_read_timeout 180s;
        proxy_buffering off;
    }
    location = /api/books/search {
        limit_req zone=bv_api burst=10 nodelay;
        proxy_pass http://127.0.0.1:8083;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }
    location ^~ /api/books/file/ {
        proxy_pass http://127.0.0.1:8083;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    location = /api/geocode {
        proxy_pass http://127.0.0.1:8084;
        proxy_set_header Host $host;
        proxy_read_timeout 12s;
    }
    location = /api/route {
        proxy_pass http://127.0.0.1:8084;
        proxy_set_header Host $host;
        proxy_read_timeout 12s;
    }
    # Scheduled send (bv-schedule). Matches /api/schedule, /api/scheduled,
    # /api/scheduled/cancel — routed to the scheduler instead of the API.
    location ^~ /api/schedule {
        limit_req zone=bv_api burst=30 nodelay;
        proxy_pass http://127.0.0.1:8798;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_read_timeout 60s;
        add_header Cache-Control "no-store" always;
    }
    # --- App-to-app messaging relay -> bv-messaging :8801 -------------------
    location ^~ /api/v1/messaging/ {
        limit_req zone=bv_api burst=120 nodelay;
        proxy_pass http://127.0.0.1:8801;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 12m;          # attachment blobs
        add_header Cache-Control "no-store" always;
    }
    # --- User sites (Neocities-style) management API -> bv-sites :8800 ------
    location ^~ /api/sites/ {
        limit_req zone=bv_api burst=60 nodelay;
        proxy_pass http://127.0.0.1:8800;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 64m;          # zip / file uploads
        add_header Cache-Control "no-store" always;
    }
    # --- Community Board (anonymous local classifieds) -> bv-board :8802 ----
    # Anonymous: no Bearer auth. Post ownership is via the x-board-secret header
    # (the poster's private-link key). Image uploads are raw bodies (<=8 MiB).
    location ^~ /api/board/ {
        limit_req zone=bv_api burst=60 nodelay;
        proxy_pass http://127.0.0.1:8802;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 8m;           # raw image uploads
        add_header Cache-Control "no-store" always;
    }
    # --- Resume Builder API -> bv-resume :8805 ------------------------------
    location ^~ /api/resume/ {
        limit_req zone=bv_api burst=30 nodelay;
        proxy_pass http://127.0.0.1:8805;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 6m;
        add_header Cache-Control "no-store" always;
    }
    location ^~ /api/ {
        access_log /var/log/nginx/bv-authdbg.log bv_authdbg;   # TEMP DIAGNOSTIC (remove after)
        limit_req zone=bv_api burst=120 nodelay;
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        add_header Cache-Control "no-store" always;
    }
    # --- Short Jitsi call links --------------------------------------------
    location ~ ^/j/([A-Za-z0-9._~-]+)$ {
        return 302 https://meet.yourdomain.com/$1;
    }


    # --- Service worker: never cache; allow root scope ----------------------
    location = /sw.js {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
    }

    # --- App bundle: REVALIDATE (not immutable) -----------------------------
    # /dist files are content-hashed but get edited IN PLACE (beautify/re-minify
    # of the deployed bundle) under the same filename. Serving them 'immutable'
    # let returning users keep a stale chunk that mismatched a newer main and
    # crashed the SPA (2026-06-02 outage). max-age=600 + nginx ETag/Last-Modified
    # means a cheap 304 revalidation picks up in-place edits within ~10 min.
    # (Permanent fix: rehash on change instead of overwriting in place.)
    location ~* ^/dist/ {
        limit_req zone=bv_static burst=3000 nodelay;
        add_header Cache-Control "public, max-age=600" always;
        try_files $uri =404;
    }
    # --- Vendor libs + fonts: truly immutable (stable names, not edited) -----
    location ~* ^/(vendor|fonts)/ {
        limit_req zone=bv_static burst=3000 nodelay;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # --- Other static (revalidate) ------------------------------------------
    location ~* ^/(i18n|icons|forms|pdfjs)/ {
        limit_req zone=bv_static burst=3000 nodelay;
        add_header Cache-Control "public, max-age=600" always;
        try_files $uri =404;
    }
    location ~* ^/(styles\.css|tokens\.css|sprite\.svg|favicon\.ico|manifest\.webmanifest)$ {
        limit_req zone=bv_static burst=3000 nodelay;
        add_header Cache-Control "public, max-age=600" always;
    }

    # --- #/explore preview thumbnails (generated by bv-shots) ---------------
    # Serves only /var/lib/bv-shots/thumbs/<handle>.jpg (public previews of public
    # sites). 404 for anything else; ?v=<publishMs> busts the 5-min cache on re-shoot.
    location ^~ /site-thumbs/ {
        limit_req zone=bv_static burst=3000 nodelay;
        alias /var/lib/bv-shots/thumbs/;
        add_header Cache-Control "public, max-age=300" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # --- Public résumé share pages (generated by bv-resume) -----------------
    # Serves /var/lib/bv-resume/shared/<slug>.html — self-contained, NO JS. Regex
    # capture (no dots/slashes) avoids the alias+try_files bug and any traversal;
    # strict CSP makes the page inert even if text injection slipped past sanitize.
    location ~ "^/r/(?<rslug>[a-z0-9][a-z0-9-]{1,31})/?$" {
        limit_req zone=bv_static burst=500 nodelay;
        root /var/lib/bv-resume/shared;
        try_files /$rslug.html =404;
        default_type text/html;
        add_header Cache-Control "public, max-age=300" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'none'; img-src data:; style-src 'unsafe-inline'; font-src data:; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" always;
    }

    # --- SPA shell + hash-router fallback -----------------------------------
    location / {
        limit_req zone=bv_static burst=3000 nodelay;
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
