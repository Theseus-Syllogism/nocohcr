# Minimal port-80 vhost for mail.yourdomain.com — only exists to satisfy
# Let's Encrypt HTTP-01 challenges for the mail hostname. Mail clients use
# IMAPS/SMTPS directly; there is no web UI on this name.
server {
    listen 80;
    listen [::]:80;
    server_name mail.yourdomain.com;
    location ^~ /.well-known/acme-challenge/ { root /var/www/_acme; }
    location / { return 404; }
}
